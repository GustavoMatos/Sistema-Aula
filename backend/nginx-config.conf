# Configuração Nginx para Lead Tracker API
# Copie este arquivo para: /etc/nginx/sites-available/lead-tracker-api
# Crie link simbólico: ln -s /etc/nginx/sites-available/lead-tracker-api /etc/nginx/sites-enabled/
# Teste: nginx -t
# Reinicie: systemctl restart nginx

server {
    listen 80;
    server_name SEU-DOMINIO.com;  # Substitua pelo seu domínio ou IP

    # Logs
    access_log /var/log/nginx/lead-tracker-api-access.log;
    error_log /var/log/nginx/lead-tracker-api-error.log;

    # Proxy para Node.js
    location / {
        proxy_pass http://localhost:3001;
        proxy_http_version 1.1;

        # Headers
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        # Cache
        proxy_cache_bypass $http_upgrade;
    }

    # Health check endpoint (sem cache)
    location /health {
        proxy_pass http://localhost:3001/health;
        access_log off;
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
}

